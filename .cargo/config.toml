[alias]
kernel = [
    "build",
    "-p",
    "boulder",
    "--bin",
    "boulder",
    "--no-default-features",
    "--features",
    "kernel-bin",
    "--target",
    "x86_64-sisyphus.json",
    "-Z",
    "json-target-spec",
    "-Z",
    "build-std=core,compiler_builtins",
    "-Z",
    "build-std-features=compiler-builtins-mem",
]
