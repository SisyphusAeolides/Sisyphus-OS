[alias]
kernel = [
    "build",
    "-p",
    "boulder",
    "--bin",
    "boulder",
    "--no-default-features",
    "--features",
    "kernel-bin,reference-driver",
    "--target",
    "x86_64-sisyphus.json",
    "-Z",
    "json-target-spec",
    "-Z",
    "build-std=core,alloc,compiler_builtins",
    "-Z",
    "build-std-features=compiler-builtins-mem",
]
user-push = [
    "build",
    "-p",
    "push",
    "--bin",
    "push",
    "--features",
    "os-bin",
    "--release",
    "--target",
    "x86_64-sisyphus-user.json",
    "-Z",
    "json-target-spec",
    "-Z",
    "build-std=core,alloc,compiler_builtins",
    "-Z",
    "build-std-features=compiler-builtins-mem",
]
user-crest = [
    "build",
    "-p",
    "crest",
    "--bin",
    "crest",
    "--features",
    "os-bin",
    "--release",
    "--target",
    "x86_64-sisyphus-user.json",
    "-Z",
    "json-target-spec",
    "-Z",
    "build-std=core,alloc,compiler_builtins",
    "-Z",
    "build-std-features=compiler-builtins-mem",
]
