name: Complete Functionality Gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  formal-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update
      - run: sudo apt-get install -y build-essential chezscheme libgmp-dev
      - uses: actions/cache@v4
        with:
          path: target/formal/toolchains
          key: formal-linux-x86_64-idris2-0.8.0-agda-2.8.0-v1
      - run: scripts/bootstrap-formal-toolchains.sh
      - uses: actions/upload-artifact@v4
        with:
          name: formal-attestation
          path: target/formal/verified.lock
          if-no-files-found: error

  source-and-host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Structural source audit
        run: python3 scripts/static-repository-audit.py
      - name: Driver ABI reference compile
        run: scripts/check-driver-abi.sh
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt,clippy
      - run: cargo fmt --all --check
      - run: cargo check --workspace
      - run: cargo test --workspace
      - run: |
          tracked=$(git ls-files | grep -E '(^|/)(scratch\.rs|.*\.(rlib|rmeta|o|a))$' || true)
          test -z "$tracked" || { printf '%s\n' "$tracked"; exit 1; }
      - run: |
          findings=$(grep -RInE --include='*.rs' --exclude-dir=target --exclude-dir=.git \
            'STUBS FOR|Pretend |pretend |mock of|#!\[allow\(dead_code\)\]|todo!\(|unimplemented!\(' \
            kernel core libraries userland || true)
          test -z "$findings" || { printf '%s\n' "$findings"; exit 1; }

  bare-metal:
    runs-on: ubuntu-latest
    needs: [formal-models, source-and-host]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2026-07-20
          components: rust-src
      - uses: actions/download-artifact@v4
        with:
          name: formal-attestation
          path: target/formal
      - run: sudo apt-get update
      - run: sudo apt-get install -y qemu-system-x86 grub-pc-bin xorriso mtools
      - run: cargo user-push
      - run: cargo kernel
      - run: scripts/test-boot.sh
