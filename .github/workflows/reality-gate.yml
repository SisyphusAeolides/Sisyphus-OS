name: Functional Reality Gate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  host-and-userland:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Structural source audit
        run: python3 scripts/static-repository-audit.py
      - name: Driver ABI reference compile
        run: scripts/check-driver-abi.sh

      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          components: rustfmt,clippy

      - name: Format
        run: cargo fmt --all --check

      - name: Check complete workspace
        run: cargo check --workspace

      - name: Test complete workspace
        run: cargo test --workspace

      - name: Check Crest executable
        run: cargo check -p crest --features os-bin

      - name: Reject new facades
        run: >-
          cargo run -p sisyphus-reality-gate --
          --root .
          --ledger target/sisyphus-functionality-ledger.tsv
